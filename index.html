<!DOCTYPE html>
<html lang="en">
<head>
  <title>Bootstrap Carousel</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

  <!-- JS -->
  <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.slim.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>

  <style>
    body {
      background: #f4f6f9;
      padding: 40px;
      text-align: center;
    }
    .carousel {
      max-width: 700px;
      margin: auto;
    }
  </style>
</head>

<body>

<h2>Bootstrap Carousel</h2>

<div id="demo" class="carousel slide" data-ride="carousel">

  <!-- Indicators -->
  <ul class="carousel-indicators">
    <li data-target="#demo" data-slide-to="0" class="active"></li>
    <li data-target="#demo" data-slide-to="1"></li>
    <li data-target="#demo" data-slide-to="2"></li>
  </ul>

  <!-- Slides -->
  <div class="carousel-inner">

    <!-- 1st (same) -->
    <div class="carousel-item active">
      <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb" class="d-block w-100">
      <div class="carousel-caption">
        <h5>Nature</h5>
        <p>Peaceful vibes</p>
      </div>
    </div>

    <!-- 2nd (aesthetic sunset road) -->
    <div class="carousel-item">
      <img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470" class="d-block w-100">
      <div class="carousel-caption">
        <h5>Sunset Drive</h5>
        <p>Golden hour mood</p>
      </div>
    </div>

    <!-- 3rd (aesthetic sky / calm) -->
    <div class="carousel-item">
      <img src="https://images.unsplash.com/photo-1499346030926-9a72daac6c63" class="d-block w-100">
      <div class="carousel-caption">
        <h5>Sky View</h5>
        <p>Calm & aesthetic</p>
      </div>
    </div>

  </div>

  <!-- Controls -->
  <a class="carousel-control-prev" href="#demo" data-slide="prev">
    <span class="carousel-control-prev-icon"></span>
  </a>

  <a class="carousel-control-next" href="#demo" data-slide="next">
    <span class="carousel-control-next-icon"></span>
  </a>

</div>

</body>
</html>
